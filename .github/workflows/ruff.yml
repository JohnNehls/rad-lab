name: Ruff Linter & Formatter

on: [push, pull_request]

jobs:
  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.8"  # Use your local ruff --version
          args: check .
      - name: Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.8"
          args: format --diff .

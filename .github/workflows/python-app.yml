# This workflow will install Python dependencies and run tests with a single version of Python.
# Linting is handled by the Ruff workflow (ruff.yml).
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        sudo apt install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended cm-super dvipng
        python -m pip install --upgrade pip
        pip install ".[dev]"
    - name: Test with pytest
      run: |
        python -m pytest tests/ -v
    - name: Apps regression (stdout + figure count; pixel image diff skipped in CI)
      env:
        RADLAB_SKIP_FIGURE_COMPARE: "1"
      run: |
        python -m pytest -m apps -v
